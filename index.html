<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News as Cards</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="logo">News as Cards</h1>
                <div class="header-controls">
                    <select id="categorySelect" class="category-dropdown">
                        <option value="technology" selected>Technology</option>
                        <option value="business">Business</option>
                        <option value="entertainment">Entertainment</option>
                        <option value="general">General</option>
                        <option value="health">Health</option>
                        <option value="science">Science</option>
                        <option value="sports">Sports</option>
                    </select>
                    <button id="refreshBtn" class="refresh-btn">🔄</button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- News Card Container -->
            <div class="news-container">
                <div id="newsCarousel" class="news-carousel">
                    <!-- News cards will be injected here -->
                </div>

                <!-- Navigation Arrows -->
                <button id="prevBtn" class="nav-btn nav-prev" title="Previous">❮</button>
                <button id="nextBtn" class="nav-btn nav-next" title="Next">❯</button>
            </div>

            <!-- Card Counter -->
            <div class="card-counter">
                <span id="cardInfo">Loading...</span>
            </div>
        </main>

        <!-- Loading & Error States -->
        <div id="loadingSpinner" class="loading-spinner hidden">
            <div class="spinner"></div>
            <p>Loading news...</p>
        </div>

        <div id="errorMessage" class="error-message hidden"></div>
        <div id="warningMessage" class="warning-message hidden"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
