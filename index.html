<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Swipe App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>News Swipe</h1>
            <button id="refresh-btn">Refresh News</button>
        </header>
        
        <div id="news-container" class="news-container">
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Loading news...</p>
            </div>
            <div id="error-message" class="error-message" style="display: none;">
                <p>Failed to load news. Please try again.</p>
                <button onclick="loadNews()">Try Again</button>
            </div>
        </div>
        
        <div class="controls">
            <button id="prev-btn" class="control-btn">← Previous</button>
            <button id="next-btn" class="control-btn">Next →</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
